# Model Hyperparameters
xgb:
  objective: binary:logistic
  eval_metric: auc
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  n_jobs: -1

backtest:
  min_edge: 0.05  # 5% edge threshold
  kelly_fraction: 0.5  # half-Kelly for safety

features:
  rolling_windows: [5, 10, 20]
  stats: ['disposals', 'kicks', 'handballs', 'marks']